# SAFETY.yaml
# Capability-Based Zero Trust Policy

# Default behavior for unknown capabilities or commands
default_action: PREVIEW

# Explicitly allow these capabilities without asking
allow:
  - capability: NETWORK_EXFIL
    name: "Allow safe API calls"

# Explicitly deny these (cannot be overridden)
deny:
  - name: "Extreme Destruction Prevention"
    commands:
      - "rm -rf /"
      - "rm -rf /*"
      - "rm -rf ./"
