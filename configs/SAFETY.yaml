rules:
  - name: "Block destructive rm"
    action: "PREVIEW"
    match:
      commands: ["rm"]
      args: ["-rf", "-f"]

  - name: "Block kubernetes deletes"
    action: "PREVIEW"
    match:
      commands: ["kubectl"]
      args: ["delete"]

  - name: "Dangerous dd"
    action: "PREVIEW"
    match:
      commands: ["dd"]
      args: ["if=/dev"]

  - name: "Stop critical services"
    action: "PREVIEW"
    match:
      commands: ["systemctl"]
      args: ["stop"]
