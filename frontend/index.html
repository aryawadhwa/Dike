<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse | Command Audit Timeline</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #333333;
            --text: #e0e0e0;
            --text-muted: #666666;
            --primary: #9d4edd;
            --danger: #ff3333;
            --success: #00ff00;
            --warning: #ffaa00;
            --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.4;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }

        .header h1::before {
            content: ">_";
            color: var(--success);
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0; /* Sharp corners, connected grid */
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-right: 1px solid var(--border);
        }
        .stat-card:last-child {
            border-right: none;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem;
            position: relative;
            height: 300px; /* Fixed height stops the infinite growth */
            display: flex;
            flex-direction: column;
        }
        
        .chart-wrapper {
            position: relative;
            flex-grow: 1;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        th {
            background: #111;
            color: var(--text-muted);
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }

        tr:last-child td {
            border-bottom: none;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .code {
            color: #fff;
            background: #000;
            padding: 0.1rem 0.3rem;
            border: 1px solid #222;
        }

        .badge {
            padding: 0.1rem 0.4rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid currentColor;
        }

        .badge.critical { color: var(--danger); }
        .badge.high { color: var(--warning); }
        .badge.preview { color: var(--primary); }
        .badge.allow, .badge.low { color: var(--success); }

        .decision.rejected { color: var(--danger); }
        .decision.applied { color: var(--success); }

        .diff {
            font-size: 0.8rem;
            white-space: pre-wrap;
            color: var(--text-muted);
        }
        .diff-added { color: var(--success); }
        .diff-removed { color: var(--danger); }

    </style>
</head>
<body>

    <div class="header">
        <h1>PULSE SECURE SHELL SYSTEM v2.0</h1>
        <div style="font-size: 0.875rem; color: var(--success)">[ SYSTEM ONLINE - LIVE MONITORING ]</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total Executions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-applied" style="color: var(--success)">0</div>
            <div class="stat-label">Allowed Commands</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-rejected" style="color: var(--danger)">0</div>
            <div class="stat-label">Blocked / Rejected</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-critical" style="color: var(--warning)">0</div>
            <div class="stat-label">Critical Intercepts</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="chart-container">
            <div class="stat-label" style="margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem;">DECISION MATRIX</div>
            <div class="chart-wrapper">
                <canvas id="decisionChart"></canvas>
            </div>
        </div>

        <div>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Command</th>
                        <th>Risk</th>
                        <th>Decision</th>
                        <th>Diff Summary</th>
                    </tr>
                </thead>
                <tbody id="audit-table">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let chartInstance = null;

        function updateChart(applied, rejected) {
            const ctx = document.getElementById('decisionChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.data.datasets[0].data = [applied, rejected];
                chartInstance.update();
                return;
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Allowed', 'Blocked'],
                    datasets: [{
                        data: [applied, rejected],
                        backgroundColor: ['#00ff00', '#ff3333'],
                        borderColor: '#0a0a0a',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#e0e0e0',
                                font: { family: "'Consolas', monospace", size: 10 }
                            }
                        }
                    }
                }
            });
        }

        function formatDiff(diffText) {
            if (!diffText || diffText === '-' || diffText === 'No file changes detected.') {
                return '<span style="color:#666">No file changes detected.</span>';
            }
            // Add simple syntax highlighting for "Files created:" and "Files deleted:"
            return diffText
                .replace(/Files created:/g, '<span class="diff-added">[+] Files created:</span>')
                .replace(/Files deleted:/g, '<span class="diff-removed">[-] Files deleted:</span>');
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-applied').innerText = stats.applied;
                document.getElementById('stat-rejected').innerText = stats.rejected;
                document.getElementById('stat-critical').innerText = stats.critical;

                updateChart(stats.applied, stats.rejected);
            } catch (e) {
                console.error("Failed to load stats", e);
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/audit');
                const logs = await res.json();
                const tbody = document.getElementById('audit-table');
                tbody.innerHTML = '';

                logs.forEach(log => {
                    const tr = document.createElement('tr');
                    
                    let riskBadge = `<span class="badge ${log.risk_level.toLowerCase()}">${log.risk_level}</span>`;
                    let decisionCls = log.decision === 'REJECTED' ? 'rejected' : 'applied';
                    let decisionHtml = `<span class="decision ${decisionCls}">[${log.decision}]</span>`;

                    tr.innerHTML = `
                        <td style="color: var(--text-muted);">${log.timestamp}</td>
                        <td style="color: #38bdf8;">${log.username}</td>
                        <td><span class="code">${log.command}</span></td>
                        <td>${riskBadge}</td>
                        <td>${decisionHtml}</td>
                        <td class="diff">${formatDiff(log.preview_summary)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("Failed to load logs", e);
            }
        }

        function refreshData() {
            fetchStats();
            fetchLogs();
        }

        refreshData();
        setInterval(refreshData, 3000);
    </script>
</body>
</html>
